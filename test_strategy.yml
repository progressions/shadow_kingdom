# Coverage Requirements
coverage:
  global_target: 75%
  critical_services: 85%
  game_mechanics: 80%
  ai_integration: 60%  # Lower due to mock mode
  ui_components: 50%   # TUI testing is limited
  utilities: 70%

  excluded_patterns:
    - "src/generated/**"  # Prisma generated files
    - "src/**/*.d.ts"     # Type definitions
    - "tests/mocks/**"    # Mock implementations
    - "scripts/**"        # Test scripts

# Test Execution Strategy
execution:
  local_development:
    command: npm test
    randomized: npm test -- --randomize
    watch: npm run test:watch
    single_file: npm test -- [file.test.ts]

  ci_pipeline:
    pre_commit:
      - npm test -- --randomize
      - npm run test:coverage
    pull_request:
      - full_test_suite
      - coverage_report
      - randomized_tests
    main_branch:
      - full_test_suite
      - e2e_journeys
      - performance_tests

# Current Gaps & Recommendations
gaps_identified:
  missing_tests:
    - Region queue management (Phase 9 implementation)
    - Command history navigation
    - Background generation race conditions
    - Prisma service migrations
    - TUI display components
    - AI mock responses
    - Event trigger system
    - Validation system

  low_coverage_areas:
    - UI components (TUI/Ink)
    - AI integration (Grok client)
    - Background services
    - Logger service
    - File utilities

  recommendations:
    high_priority:
      - Add tests for new Phase 9 region queue system
      - Increase coverage on critical game paths
      - Add more E2E journey tests
      - Test Prisma migration compatibility

    medium_priority:
      - Improve AI mock testing
      - Add performance benchmarks
      - Test error recovery paths
      - Add multiplayer isolation tests

    low_priority:
      - UI component testing (limited by TUI nature)
      - Logging verification
      - Debug command testing

# Performance Testing
performance:
  benchmarks:
    room_generation: < 500ms
    database_queries: < 50ms
    ai_generation: < 2000ms (with fallback)
    command_processing: < 100ms
    
  load_testing:
    max_rooms_per_game: 1000
    concurrent_players: 10  # Future multiplayer
    generation_queue_size: 50

# Test Data Management
test_data:
  fixtures:
    - Starting room configurations
    - Test character stats
    - Mock AI responses
    - Item catalogs
    - Region templates
    
  seeding:
    location: tests/setup.ts
    approach: In-memory SQLite with fresh data per test
    
  cleanup:
    automatic: true  # In-memory DB cleans itself
    manual: Not required

# Documentation
documentation:
  test_guidelines: tests/CLAUDE.md
  conventions:
    - Never assume database order
    - Use unique identifiers
    - Test with randomization
    - Ensure clean Jest exit
    - Mock external services