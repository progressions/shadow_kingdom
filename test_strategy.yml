# Shadow Kingdom Test Strategy
# Generated based on codebase analysis on 2025-08-24

project:
  name: Shadow Kingdom
  type: Text Adventure Game (TypeScript/Node.js)
  framework: Custom TUI with Ink/React
  database: SQLite with Prisma ORM
  ai_integration: Grok AI for content generation

testing_frameworks:
  unit: Jest with ts-jest
  e2e: Jest (no separate E2E framework - using integration tests)
  coverage: Jest coverage with lcov reporter
  configuration:
    serial_execution: true  # maxWorkers: 1 to avoid database conflicts
    database_isolation: ":memory:"  # In-memory SQLite for test isolation
    setup_file: tests/setup.ts

current_test_statistics:
  total_test_files: 115
  total_services: 40
  service_coverage:
    prisma_services: 15  # Services with .prisma.ts variants
    standard_services: 25
  test_categories:
    unit_tests: 70
    integration_tests: 9
    e2e_tests: 10
    command_tests: 10
    service_tests: 15

naming_conventions:
  test_files: "*.test.ts"
  test_directories:
    - tests/
    - tests/services/
    - tests/commands/
    - tests/integration/
    - tests/e2e/
    - tests/ai/
    - tests/utils/
    - tests/adapters/
    - tests/display/
  describe_blocks: "DescriptiveName"  # e.g., "Movement Room Generation Integration"
  test_names: "should [action] [expected result]"

# Core Services Testing Strategy
services:
  game_controller:
    file: src/gameController.ts
    tests:
      - tests/gameController.automatic-loading.test.ts
      - tests/gameController.command-execution.test.ts
    priority: critical
    coverage_target: 90%
    key_methods:
      - processCommand
      - handleMovement
      - handleExamine
      - handleAttack
      - handleInventory
      - handleEquip
      - handleGive
      - handleTalk

  game_state_manager:
    file: src/services/gameStateManager.ts
    prisma_variant: src/services/gameStateManager.prisma.ts
    tests:
      - tests/services/gameStateManager.prisma.test.ts
    priority: critical
    coverage_target: 85%
    key_methods:
      - startGameSession
      - moveToRoom
      - getCurrentRoom
      - findConnection
      - saveGameState

  region_service:
    file: src/services/regionService.ts
    prisma_variant: src/services/regionService.prisma.ts
    tests:
      - tests/regionService.test.ts
      - tests/services/regionInstantiation.test.ts
      - tests/services/regionConnection.test.ts
    priority: high
    coverage_target: 80%
    key_methods:
      - createRegion
      - instantiateRegion
      - connectRegions
      - buildRegionContext

  room_generation_service:
    file: src/services/roomGenerationService.ts
    prisma_variant: src/services/roomGenerationService.prisma.ts
    tests:
      - tests/room-generation-character-integration.test.ts
      - tests/movement-room-generation.test.ts
    priority: high
    coverage_target: 75%
    key_methods:
      - generateSingleRoom
      - generateRoomForConnection
      - generateFallbackCharacters

  character_service:
    file: src/services/characterService.ts
    prisma_variant: src/services/characterService.prisma.ts
    tests:
      - tests/characterService.test.ts
      - tests/services/character-sentiment.test.ts
      - tests/services/character-behavioral-fallback.test.ts
    priority: high
    coverage_target: 80%
    key_methods:
      - getPlayerCharacter
      - getCharactersInRoom
      - updateSentiment
      - handleCharacterDeath

  item_service:
    file: src/services/itemService.ts
    prisma_variant: src/services/itemService.prisma.ts
    tests:
      - tests/services/itemService.test.ts
      - tests/item-generation.test.ts
      - tests/fixed-items.test.ts
    priority: medium
    coverage_target: 75%
    key_methods:
      - getItemsInRoom
      - pickupItem
      - dropItem
      - transferItemToRoom
      - equipItem

  health_service:
    file: src/services/healthService.ts
    prisma_variant: src/services/healthService.prisma.ts
    tests:
      - tests/healthService.test.ts
      - tests/health-integration.test.ts
    priority: high
    coverage_target: 85%
    key_methods:
      - initializeHealth
      - dealDamage
      - healCharacter
      - checkDeath
      - getHealthDisplay

  equipment_service:
    file: src/services/equipmentService.ts
    prisma_variant: src/services/equipmentService.prisma.ts
    tests:
      - tests/services/equipmentService.test.ts
      - tests/commands/context-aware-equip.test.ts
    priority: medium
    coverage_target: 75%
    key_methods:
      - equipItem
      - unequipItem
      - getEquippedWeapon
      - getEquippedArmor
      - calculateArmorValue

